version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # one PR per run — split bumps of related actions (e.g. codeql-action's
    # init/analyze pair) can drift out of version-sync otherwise
    groups:
      actions:
        patterns:
          - "*"
